[main]
disable = 1
tempdir = /tmp/mmc-store
# Script to regenerate packages in Medulla database
generate_package_script = /usr/sbin/pulse2-generation_package.py

[database]
dbdriver = mysql
dbhost = localhost
dbport = 3306
dbname = store
dbuser = mmc
dbpasswd = mmc

[client]
# Unique UUID of this Medulla instance (generated once during installation)
# Must correspond to an entry in the clients table of the store database
uuid =

[kestra]
# Enable Kestra integration
enabled = 0

# Packages API - server fetches packages from Kestra
# packages_api_url = http://kestra.example.com:8081
# packages_api_token = your_server_specific_token_here

# AI webhook for software requests research
# ai_webhook_url = http://kestra.example.com:8080/api/v1/executions/webhook/medulla/ai_software_research/xxx

# Skip SSL certificate verification (1 for self-signed certificates)
skip_ssl_verify = 0