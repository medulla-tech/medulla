[main]
disable = 1
tempdir = /tmp/mmc-store
# Script to regenerate packages in Medulla database
generate_package_script = /usr/sbin/pulse2-generation_package.py

[database]
dbdriver = mysql
dbhost = localhost
dbport = 3306
dbname = store
dbuser = mmc
dbpasswd = mmc

[store_api]
# Remote store catalog API
# url = https://store.medulla-tech.io
# api_token =
# client_uuid =
# Request timeout in seconds
timeout = 15
skip_ssl_verify = 0

[packages_api]
# Remote packages API for downloading packages
# url = https://packages.medulla-tech.io
# api_token =
# Timeout in seconds (for large package downloads, increase if needed)
timeout = 300
skip_ssl_verify = 0
