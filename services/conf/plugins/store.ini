[main]
disable = 1
tempdir = /tmp/mmc-store
# Script to regenerate packages in Medulla database
generate_package_script = /usr/sbin/pulse2-generation_package.py

[database]
dbdriver = mysql
dbhost = localhost
dbport = 3306
dbname = store
dbuser = mmc
dbpasswd = mmc

[store_api]
# Remote store API (catalog, subscriptions, packages)
# url = https://store.medulla-tech.io
# api_token =
# client_uuid =
# Deployment language(s), comma-separated (fr_FR, en_US, es_ES, multi)
# Example: lang = fr_FR,es_ES
lang = fr_FR
# Request timeout in seconds
timeout = 15
skip_ssl_verify = 0
